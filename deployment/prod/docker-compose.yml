services:
  nginx-acme:
    container_name: nginx_acme
    restart: unless-stopped
    image: nginx:latest
    ports:
      - "127.0.0.1:9080:80"
      - "127.0.0.1:9443:443"
    volumes:
      - /home/vdgsaapi/nginx-acme/acme-webroot:/var/www/acme-webroot
      - /home/vdgsaapi/nginx-acme/conf.d/default.conf:/etc/nginx/conf.d/default.conf

  django:
    container_name: vdgsa_django
    restart: unless-stopped
    build:
      # Set the build context to the top-level directory of the repo.
      # The directory of the dockerfile below and paths in the actual
      # Dockerfile are relative to the build context directory.
      context: ../../app_backend
      dockerfile: ../deployment/dev/Dockerfile-django
    ports:
      - "127.0.0.1:8080:8000"
    command: /usr/local/bin/uwsgi --ini /usr/src/app/uwsgi.ini --static-map /static=/usr/src/static
    environment:
      DEPLOYMENT_MODE: prod
    env_file: .env
    volumes:
      - /home/vdgsaapi/vdgsa_backend/media_root:/usr/src/uploads

    secrets:
      - postgres_password
      - stripe_private_key
      - django_app_secret_key

  postgres:
    container_name: vdgsa_postgres
    restart: unless-stopped
    image: postgres:17
    # expose:
    #  - "5432"
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - vdgsa_pgdata17:/var/lib/postgresql/data/
      - /home/vdgsaapi/letsencrypt:/letsencrypt
      - /home/vdgsaapi/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: 'vdgsa_postgres'
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_CONFIG_FILE: /etc/postgresql/postgresql.conf

    secrets:
      - postgres_password

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  stripe_private_key:
    file: ./secrets/stripe_private_key
  django_app_secret_key:
    file: ./secrets/django_app_secret_key

volumes:
  vdgsa_pgdata: {}
  vdgsa_pgdata17: {}
